<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up - PlayPredikt</title>
<link rel="stylesheet" href="Style.css">
</head>

<body>

<header class="header">
    <h1>🏏 Create Account</h1>
    <p>Join PlayPredikt</p>
</header>

<div class="card">

    <input type="text" id="name" placeholder="👤 Full Name" style="width:100%;padding:15px;margin:10px 0;border:none;border-radius:10px;">

    <input type="email" id="email" placeholder="📧 Email" style="width:100%;padding:15px;margin:10px 0;border:none;border-radius:10px;">

    <input type="password" id="password" placeholder="🔒 Password" style="width:100%;padding:15px;margin:10px 0;border:none;border-radius:10px;">

    <button id="signupBtn" style="width:100%;padding:15px;background:#00E676;border:none;border-radius:10px;color:white;font-size:18px;">
        Sign Up
    </button>

    <p style="text-align:center;margin-top:20px;">
        Already have an account?
        <a href="Login.html">Login</a>
    </p>

</div>

<script type="module" src="signup.js"></script>

</body>
</html>
