<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - PlayPredikt</title>
<link rel="stylesheet" href="Style.css">
</head>

<body>

<header class="header">
<h1>🏏 PlayPredikt</h1>
<p>Login to Continue</p>
</header>

<div class="card">

<input
type="email"
id="email"
placeholder="📧 Email"
style="width:100%;padding:15px;margin:10px 0;border-radius:10px;border:none;">

<input
type="password"
id="password"
placeholder="🔒 Password"
style="width:100%;padding:15px;margin:10px 0;border-radius:10px;border:none;">

<button
id="loginBtn"
style="width:100%;padding:15px;background:#00E676;border:none;border-radius:10px;font-size:18px;font-weight:bold;">
Login
</button>

<br><br>

<p style="text-align:center;">
Don't have an account?
<a href="signup.html">Sign Up</a>
</p>

</div>

<script type="module" src="login.js"></script>

</body>
</html>
