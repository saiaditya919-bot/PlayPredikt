<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile - PlayPredikt</title>
<link rel="stylesheet" href="Style.css">
</head>

<body style="background:#0B1020;color:white;font-family:Arial;padding:20px;">

<div style="text-align:center;">

<img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
width="120"
style="border-radius:50%;border:4px solid #00E676;">

<h1 id="userName">Loading...</h1>

<p id="userEmail" style="color:#BBBBBB;">Loading...</p>

</div>

<div style="background:#1B2236;padding:20px;border-radius:15px;margin-top:20px;">

<h3>🏏 My Stats</h3>

<p>Prediction Points: <b>0</b></p>

<p>Matches Predicted: <b>0</b></p>

<p>Win Rate: <b>0%</b></p>

</div>

<div style="margin-top:20px;">

<button onclick="location.href='index.html'" style="width:100%;padding:15px;background:#00E676;border:none;border-radius:10px;font-size:18px;font-weight:bold;margin-bottom:10px;">
🏠 Home
</button>

<button onclick="location.href='Prediction.html'" style="width:100%;padding:15px;background:#2979FF;border:none;border-radius:10px;font-size:18px;color:white;margin-bottom:10px;">
📊 Predictions
</button>

<button id="logoutBtn" style="width:100%;padding:15px;background:red;border:none;border-radius:10px;font-size:18px;color:white;">
🚪 Logout
</button>

</div>

<script type="module">
import { auth } from "./firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

onAuthStateChanged(auth,(user)=>{
if(user){
document.getElementById("userName").textContent=user.displayName||"PlayPredikt User";
document.getElementById("userEmail").textContent=user.email;
}else{
window.location.href="Login.html";
}
});
</script>

<script type="module" src="logout.js"></script>

</body>
</html>
