<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile - PlayPredikt</title>
<link rel="stylesheet" href="Style.css">
</head>

<body style="margin:0;background:#0B1020;font-family:Arial,sans-serif;color:white;">

<div style="padding:25px;text-align:center;">

<img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
style="width:120px;height:120px;border-radius:50%;border:4px solid #00E676;">

<h1 id="userName" style="margin:15px 0 5px;">Loading...</h1>

<p id="userEmail" style="color:#B0BEC5;">Loading...</p>

</div>

<div style="margin:20px;background:#1B2236;border-radius:15px;padding:20px;">

<h2>🏏 My Statistics</h2>

<p>⭐ Prediction Points : <b>0</b></p>
<p>🏆 Matches Predicted : <b>0</b></p>
<p>📈 Win Rate : <b>0%</b></p>

</div>

<div style="margin:20px;display:flex;flex-direction:column;gap:12px;">

<button onclick="window.location.href='index.html'"
style="padding:15px;border:none;border-radius:10px;background:#00C853;color:white;font-size:18px;">
🏠 Home
</button>

<button onclick="window.location.href='Prediction.html'"
style="padding:15px;border:none;border-radius:10px;background:#2979FF;color:white;font-size:18px;">
📊 Predictions
</button>

<button id="logoutBtn"
style="padding:15px;border:none;border-radius:10px;background:#D50000;color:white;font-size:18px;">
🚪 Logout
</button>

</div>

<script type="module">
import { auth } from "./firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

onAuthStateChanged(auth,(user)=>{
    if(user){
        document.getElementById("userName").textContent=user.displayName || "PlayPredikt User";
        document.getElementById("userEmail").textContent=user.email;
    }else{
        window.location.href="Login.html";
    }
});
</script>

<script type="module" src="logout.js"></script>

</body>
</html>
